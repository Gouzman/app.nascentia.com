name: nascentia
description: Site web officiel de l'application NASCENTIA - Landing page moderne

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Google Fonts pour les polices personnalisées
  google_fonts: ^6.1.0

  # Icônes de marques (Facebook, Instagram, WhatsApp, Telegram…)
  font_awesome_flutter: ^10.7.0

  # Backend Supabase
  supabase_flutter: ^2.8.4

  # Liens externes (mailto, tel, https)
  url_launcher: ^6.3.2

  # HTTP requests pour Brevo API
  http: ^1.2.0

  # BlurHash pour placeholders progressifs (effet Facebook)
  flutter_blurhash: ^0.8.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Assets - Images des mockups
  assets:
    - lib/assets/images/
