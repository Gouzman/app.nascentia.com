  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <title>NASCENTIA – Application de Planification Familiale</title>

  <!-- Écran de chargement -->
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #E95263 0%, #F43666 50%, #582674 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      color: white;
      text-align: center;
      padding: 24px;
      transition: opacity 0.4s ease-out;
    }

    #loading-screen.fade-out {
      opacity: 0;
    }

    .loading-logo-container {
      width: 90px;
      height: 90px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .loading-logo-text {
      font-size: 28px;
      font-weight: 800;
      color: white;
      letter-spacing: 2px;
    }

    .loading-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 0;
    }

    .loading-subtitle {
      font-size: 13px;
      opacity: 0.75;
      letter-spacing: 0.5px;
      margin: 0;
    }

    .loading-bar-container {
      width: 160px;
      height: 3px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      background: white;
      border-radius: 999px;
      animation: progress 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.96); opacity: 0.85; }
    }

    @keyframes progress {
      0%   { width: 0%;   transform: translateX(-100%); }
      50%  { width: 70%;  transform: translateX(0%); }
      100% { width: 100%; transform: translateX(100%); }
    }
  </style>
</head>
<body>
  <!-- Écran de chargement visible pendant l'initialisation Flutter -->
  <div id="loading-screen">
    <div class="loading-logo-container">
      <span class="loading-logo-text">N</span>
    </div>
    <p class="loading-title">NASCENTIA</p>
    <p class="loading-subtitle">Planification familiale naturelle</p>
    <div class="loading-bar-container">
      <div class="loading-bar"></div>
    </div>
  </div>

  <!-- Script Bootstrap Flutter (compatible Flutter 3.22+) -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Masquer l'écran de chargement une fois Flutter démarré
    window.addEventListener('flutter-first-frame', function() {
      var loadingScreen = document.getElementById('loading-screen');
      if (loadingScreen) {
        loadingScreen.classList.add('fade-out');
        setTimeout(function() {
          loadingScreen.remove();
        }, 450);
      }
    });
  </script>
</body>
</html>
